spring.application.name=academic-grades-api

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URI:jdbc:postgresql://localhost:5433/academic_grades}
spring.datasource.username=${DB_USER:academic_user}
spring.datasource.password=${DB_PASSWORD:academic_pass}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha