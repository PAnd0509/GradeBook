services:
  db:
    image: postgres:16
    container_name: academic_grades_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: academic_grades_api
    restart: always
    env_file:
      - .env
    environment:
      SERVER_PORT: 8080
      DB_URI: jdbc:postgresql://db:5432/${POSTGRES_DB}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER: ${DB_DRIVER}
      CORS_ALLOWED_ORIGINS: http://localhost:${FRONTEND_PORT}
    ports:
      - "${SERVER_PORT}:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../academic-grades-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: academic_grades_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - api

volumes:
  postgres_data: